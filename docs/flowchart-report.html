<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>EduTrack Flow Chart – Report</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#fff; display:flex; justify-content:center; padding:30px; font-family:'Segoe UI',Arial,sans-serif; }
</style>
</head>
<body>
<!-- A4 portrait width ~794px -->
<svg xmlns="http://www.w3.org/2000/svg" width="750" height="1020" viewBox="0 0 750 1020">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#444"/>
    </marker>
    <style>
      text { font-family:'Segoe UI',Arial,sans-serif; }
      .conn  { stroke:#444; stroke-width:1.8; fill:none; marker-end:url(#arr); }
      .line  { stroke:#444; stroke-width:1.8; fill:none; }
      .t1    { font-size:12px; font-weight:700; }
      .t2    { font-size:11px; font-weight:400; }
      .edge  { font-size:11px; font-weight:700; }
      .shape-label { font-size:9px; fill:#888; font-style:italic; }
    </style>
  </defs>

  <!-- TITLE -->
  <text x="375" y="32" text-anchor="middle" font-size="20" font-weight="800" fill="#1a56db" letter-spacing="2">EduTrack – System Flow Chart</text>
  <text x="375" y="50" text-anchor="middle" font-size="11" fill="#6b7280">Academic Management Platform</text>

  <!-- ════════════════════════════════
       1. START — Terminal (rounded rect)
  ════════════════════════════════ -->
  <rect x="262" y="62" width="226" height="38" rx="19" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
  <text x="375" y="86" text-anchor="middle" class="t1" fill="#14532d">🌐  User visits EduTrack</text>
  <text x="496" y="72" class="shape-label">Terminal</text>

  <line x1="375" y1="100" x2="375" y2="118" class="conn"/>

  <!-- ════════════════════════════════
       2. INPUT — Parallelogram
  ════════════════════════════════ -->
  <polygon points="230,120 530,120 510,158 210,158" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="375" y="144" text-anchor="middle" class="t1" fill="#3b0764">👤  Register / Login (Student · Teacher · Admin)</text>
  <text x="538" y="130" class="shape-label">Input</text>

  <line x1="375" y1="158" x2="375" y2="176" class="conn"/>

  <!-- ════════════════════════════════
       3. DECISION — Role?
  ════════════════════════════════ -->
  <polygon points="375,178 470,218 375,258 280,218" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="375" y="213" text-anchor="middle" class="t1" fill="#92400e">Select Role?</text>
  <text x="478" y="188" class="shape-label">Decision</text>

  <!-- Student left -->
  <polyline points="280,218 100,218 100,278" class="conn"/>
  <text x="188" y="210" text-anchor="middle" class="edge" fill="#0d9488">Student</text>

  <!-- Teacher center -->
  <line x1="375" y1="258" x2="375" y2="278" class="conn"/>
  <text x="390" y="273" class="edge" fill="#ca8a04">Teacher</text>

  <!-- Admin right -->
  <polyline points="470,218 650,218 650,278" class="conn"/>
  <text x="562" y="210" text-anchor="middle" class="edge" fill="#4338ca">Admin</text>

  <!-- ════════════════════════════════
       4a. STUDENT — Process
  ════════════════════════════════ -->
  <rect x="20" y="280" width="160" height="110" rx="6" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
  <text x="100" y="300" text-anchor="middle" class="t1" fill="#134e4a">🎓 Student</text>
  <text x="100" y="318" text-anchor="middle" class="t2" fill="#134e4a">• View Courses</text>
  <text x="100" y="334" text-anchor="middle" class="t2" fill="#134e4a">• View Attendance</text>
  <text x="100" y="350" text-anchor="middle" class="t2" fill="#134e4a">• View Marks</text>
  <text x="100" y="366" text-anchor="middle" class="t2" fill="#134e4a">• Submit Assignments</text>
  <text x="100" y="382" text-anchor="middle" class="t2" fill="#134e4a">• Course Materials</text>
  <text x="188" y="288" class="shape-label">Process</text>

  <!-- ════════════════════════════════
       4b. TEACHER — Process
  ════════════════════════════════ -->
  <rect x="295" y="280" width="160" height="110" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="375" y="300" text-anchor="middle" class="t1" fill="#713f12">📚 Teacher</text>
  <text x="375" y="318" text-anchor="middle" class="t2" fill="#713f12">• Mark Attendance</text>
  <text x="375" y="334" text-anchor="middle" class="t2" fill="#713f12">• Enter Marks</text>
  <text x="375" y="350" text-anchor="middle" class="t2" fill="#713f12">• Auto Grade (O/A+/A)</text>
  <text x="375" y="366" text-anchor="middle" class="t2" fill="#713f12">• Create Assignments</text>
  <text x="375" y="382" text-anchor="middle" class="t2" fill="#713f12">• Upload Materials</text>

  <!-- ════════════════════════════════
       4c. ADMIN — Process
  ════════════════════════════════ -->
  <rect x="570" y="280" width="160" height="110" rx="6" fill="#e0e7ff" stroke="#4338ca" stroke-width="2"/>
  <text x="650" y="300" text-anchor="middle" class="t1" fill="#1e1b4b">⚙️ Admin</text>
  <text x="650" y="318" text-anchor="middle" class="t2" fill="#1e1b4b">• Manage Students</text>
  <text x="650" y="334" text-anchor="middle" class="t2" fill="#1e1b4b">• Manage Teachers</text>
  <text x="650" y="350" text-anchor="middle" class="t2" fill="#1e1b4b">• Manage Courses</text>
  <text x="650" y="366" text-anchor="middle" class="t2" fill="#1e1b4b">• Bulk Import CSV</text>
  <text x="650" y="382" text-anchor="middle" class="t2" fill="#1e1b4b">• System Settings</text>

  <!-- merge 3 cols -->
  <polyline points="100,390 100,430 650,430 650,390" class="line"/>
  <line x1="375" y1="390" x2="375" y2="430" class="line"/>
  <line x1="375" y1="430" x2="375" y2="448" class="conn"/>

  <!-- ════════════════════════════════
       5. PROCESS — DB save
  ════════════════════════════════ -->
  <rect x="220" y="450" width="310" height="44" rx="6" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
  <text x="375" y="470" text-anchor="middle" class="t1" fill="#134e4a">🗄️  Data Saved to MySQL Database</text>
  <text x="375" y="487" text-anchor="middle" class="t2" fill="#134e4a">Railway (Cloud) · Spring Data JPA · Hibernate</text>

  <line x1="375" y1="494" x2="375" y2="512" class="conn"/>

  <!-- ════════════════════════════════
       6. OUTPUT — Parallelogram
  ════════════════════════════════ -->
  <polygon points="195,514 565,514 545,554 175,554" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="375" y="539" text-anchor="middle" class="t1" fill="#1e3a8a">📊  Student views Attendance · Marks · Assignments in real time</text>
  <text x="573" y="524" class="shape-label">Output</text>

  <line x1="375" y1="554" x2="375" y2="572" class="conn"/>

  <!-- ════════════════════════════════
       7. DECISION — Forgot Password?
  ════════════════════════════════ -->
  <polygon points="375,574 480,614 375,654 270,614" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="375" y="609" text-anchor="middle" class="t1" fill="#92400e">Forgot Password?</text>
  <text x="488" y="584" class="shape-label">Decision</text>

  <!-- YES left -->
  <polyline points="270,614 140,614 140,664" class="conn"/>
  <text x="203" y="606" text-anchor="middle" class="edge" fill="#16a34a">YES</text>

  <!-- NO right -->
  <polyline points="480,614 610,614 610,664" class="conn"/>
  <text x="548" y="606" text-anchor="middle" class="edge" fill="#dc2626">NO</text>

  <!-- ════════════════════════════════
       8a. YES — OTP flow
  ════════════════════════════════ -->
  <!-- Input: enter email -->
  <polygon points="50,666 240,666 222,700 32,700" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="137" y="688" text-anchor="middle" class="t1" fill="#3b0764">✉️  Enter Email</text>

  <line x1="137" y1="700" x2="137" y2="718" class="conn"/>

  <!-- Process: OTP sent -->
  <rect x="52" y="720" width="170" height="40" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="137" y="738" text-anchor="middle" class="t1" fill="#7c2d12">📧  OTP Sent via Gmail</text>
  <text x="137" y="753" text-anchor="middle" class="t2" fill="#7c2d12">6-digit · 10 min expiry</text>

  <line x1="137" y1="760" x2="137" y2="778" class="conn"/>

  <!-- Decision: OTP valid? -->
  <polygon points="137,780 210,814 137,848 64,814" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="137" y="809" text-anchor="middle" class="t1" fill="#92400e">OTP Valid?</text>

  <!-- Invalid loop -->
  <polyline points="64,814 20,814 20,730 52,730" class="conn"/>
  <text x="8" y="775" text-anchor="middle" class="edge" fill="#dc2626" transform="rotate(-90,8,775)">Retry</text>

  <!-- Valid -->
  <line x1="137" y1="848" x2="137" y2="866" class="conn"/>
  <text x="152" y="862" class="edge" fill="#16a34a">Valid</text>

  <!-- Input: new password -->
  <polygon points="32,868 242,868 224,904 14,904" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="128" y="891" text-anchor="middle" class="t1" fill="#3b0764">🔑  Enter New Password</text>

  <line x1="128" y1="904" x2="128" y2="922" class="conn"/>

  <!-- Process: updated -->
  <rect x="38" y="924" width="180" height="38" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="128" y="942" text-anchor="middle" class="t1" fill="#14532d">✅  Password Updated</text>
  <text x="128" y="957" text-anchor="middle" class="t2" fill="#14532d">BCrypt Encrypted &amp; Saved</text>

  <line x1="128" y1="962" x2="128" y2="980" class="conn-plain"/>
  <line x1="128" y1="980" x2="375" y2="980" class="line"/>

  <!-- ════════════════════════════════
       8b. NO — Continue
  ════════════════════════════════ -->
  <rect x="520" y="666" width="180" height="38" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="610" y="684" text-anchor="middle" class="t1" fill="#14532d">✅  Continue Session</text>
  <text x="610" y="699" text-anchor="middle" class="t2" fill="#14532d">Stay logged in</text>

  <line x1="610" y1="704" x2="610" y2="980" class="line"/>
  <line x1="610" y1="980" x2="375" y2="980" class="line"/>
  <line x1="375" y1="980" x2="375" y2="998" class="conn"/>

  <!-- ════════════════════════════════
       9. END — Terminal
  ════════════════════════════════ -->
  <rect x="262" y="1000" width="226" height="38" rx="19" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
  <text x="375" y="1024" text-anchor="middle" class="t1" fill="#14532d">🎓  Session Complete ✅</text>
  <text x="496" y="1010" class="shape-label">Terminal</text>

  <!-- ════════════════════════════════
       LEGEND
  ════════════════════════════════ -->
  <rect x="20" y="958" width="8" height="8" rx="2" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="34" y="967" class="shape-label" fill="#444">Terminal (Start/End)</text>

  <polygon points="80,958 110,958 106,966 76,966" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="116" y="967" class="shape-label" fill="#444">Input / Output</text>

  <rect x="190" y="958" width="8" height="8" rx="1" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="204" y="967" class="shape-label" fill="#444">Process</text>

  <polygon points="248,962 258,958 268,962 258,966" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="274" y="967" class="shape-label" fill="#444">Decision</text>

</svg>
</body>
</html>
